name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/PianoTracker.Api/ClientApp/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/PianoTracker.Api/ClientApp
        run: npm ci

      - name: Lint frontend
        working-directory: src/PianoTracker.Api/ClientApp
        run: npm run lint

      - name: Build frontend
        working-directory: src/PianoTracker.Api/ClientApp
        run: npm run build

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET
        run: dotnet build --configuration Release --no-restore

      - name: Publish .NET
        run: dotnet publish src/PianoTracker.Api/PianoTracker.Api.csproj -c Release -o ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish

  # Deploy to GitHub Pages (frontend only for demo)
  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/PianoTracker.Api/ClientApp/package-lock.json

      - name: Install dependencies
        working-directory: src/PianoTracker.Api/ClientApp
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: src/PianoTracker.Api/ClientApp
        run: npm run build
        env:
          VITE_BASE_PATH: /piano-tracker/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/PianoTracker.Api/ClientApp/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
